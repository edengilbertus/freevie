services:
  - type: web
    name: freevie
    env: node
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: CACHE_TTL
        value: 3600000
      - key: HEALTH_CHECK_INTERVAL
        value: 1800000
      - key: HEALTH_FILTER
        value: "true"
      - key: STRICT_IPTV_VALIDATION
        value: "false"
      - key: ENABLE_ADULT
        value: "true"
      - key: ADULT_M3U_URLS
        value: "https://raw.githubusercontent.com/sacuar/MyIPTV/main/Play1.m3u,https://iptvmate.net/files/adult.m3u"
      - key: ADULT_M3U_URL
        value: "https://iptvmate.net/files/xxx.m3u"
      - key: UG_M3U_URL
        value: "https://iptv-org.github.io/iptv/countries/ug.m3u"
      - key: EXTRA_M3U_URLS
        value: "https://iptv-org.github.io/iptv/countries/gb.m3u,https://iptv-org.github.io/iptv/countries/ie.m3u,https://iptv-org.github.io/iptv/countries/qa.m3u,https://iptv-org.github.io/iptv/countries/ae.m3u,https://iptv-org.github.io/iptv/countries/sa.m3u,https://iptv-org.github.io/iptv/countries/fr.m3u,https://iptv-org.github.io/iptv/countries/es.m3u,https://iptv-org.github.io/iptv/countries/ke.m3u,https://iptv-org.github.io/iptv/countries/ng.m3u,https://iptv-org.github.io/iptv/countries/za.m3u"
      - key: PROXY_HOST
        value: ""
        # Set this to your Render URL, e.g: https://freevie.onrender.com
        # This enables the stream relay for smoother playback
